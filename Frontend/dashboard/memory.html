<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TwinThink - Memory Engine</title>

  <link rel="stylesheet" href="memory.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
</head>

<body>

  <!-- BACKGROUND -->
  <video autoplay muted loop class="bg-video">
    <source src="background_vedio.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <!-- NAVBAR -->
  <header class="topbar">

    <a href="dashboard.html" class="logo">
      <img src="logo.png" alt="logo">
      <span>TwinThink</span>
    </a>

    <nav class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="upload.html">Upload</a>
      <a href="chat.html">AI Chat</a>
      <a class="active" href="memory.html">Memory</a>
      <a href="settings.html">Settings</a>
    </nav>

    <div class="status">● Memory Engine Active</div>

  </header>

  <!-- MAIN CONTENT -->
  <div class="container">

    <!-- LEFT TIMELINE -->
    <aside class="timeline" id="timeline">
      <h3>Memory Timeline</h3>
    </aside>

    <!-- CENTER MEMORY VIEW -->
    <main class="memory-view">

      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          placeholder="Search memories..."
        >
      </div>

      <h2>Stored Memories</h2>

    </main>

    <!-- RIGHT CONTROLS -->
    <aside class="controls">

      <h3>Memory Control</h3>

      <button onclick="searchMemory()">🔍 Search Memory</button>
      <button onclick="addMemory()">➕ Add Memory</button>
      <button onclick="summarizeAll()">🧠 Summarize All</button>
      <button onclick="whatForgot()">⚠ What You Forgot</button>

      <div class="stats">
        <p>📦 Dynamic Memory Storage</p>
        <p>🧠 AI Memory Engine</p>
        <p>⚡ Status: Active</p>
      </div>

    </aside>

  </div>

  <!-- LOAD JS AT VERY END -->
  <script src="memory.js"></script>

</body>
</html>
