<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TwinThink - Settings</title>

  <link rel="stylesheet" href="settings.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

  <!-- BACKGROUND -->
  <video autoplay muted loop class="bg-video">
    <source src="background_vedio.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <!-- ================= NAVBAR ================= -->
  <header class="topbar">

    <a href="dashboard.html" class="logo">
      <img src="logo.png" alt="logo">
      <span>TwinThink</span>
    </a>

    <nav class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="upload.html">Upload</a>
      <a href="chat.html">AI Chat</a>
      <a href="memory.html">Memory</a>
      <a class="active" href="settings.html">Settings</a>
    </nav>

    <div class="status">● System Config Active</div>

  </header>

  <!-- MAIN -->
  <div class="container">

    <!-- LEFT PANEL -->
    <div class="panel">
      <h3>System Profile</h3>
      <p>Configure your TwinThink AI environment.</p>

      <div class="info-box">
        <p>Mode: Development</p>
        <p>RAG Engine: Active</p>
        <p>Vector DB: FAISS</p>
      </div>
    </div>

    <!-- CENTER PANEL -->
    <div class="panel center">

      <h2>Settings Control</h2>

      <div class="setting">
        <label>AI Response Mode</label>
        <select>
          <option>Balanced</option>
          <option>Fast</option>
          <option>Precise</option>
        </select>
      </div>

      <div class="setting">
        <label>Memory Retention</label>
        <select>
          <option>Short Term</option>
          <option>Medium Term</option>
          <option>Long Term</option>
        </select>
      </div>

      <div class="setting">
        <label>Theme Mode</label>
        <select>
          <option>Dark (Default)</option>
          <option>Neon</option>
          <option>Minimal</option>
        </select>
      </div>

      <button class="save-btn">Save Configuration</button>

    </div>

    <!-- RIGHT PANEL -->
    <div class="panel">
      <h3>System Status</h3>

      <div class="status-box">
        <p>⚡ Pipeline: Idle</p>
        <p>🧠 Embedding: Ready</p>
        <p>🔗 API: Connected</p>
        <p>📊 Logs: Stable</p>
      </div>
    </div>

  </div>

</body>
</html>
