<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TwinThink Upload Engine</title>

  <link rel="stylesheet" href="upload.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

  <!-- BACKGROUND VIDEO -->
  <video autoplay muted loop class="bg-video">
    <source src="background_vedio.mp4" type="video/mp4">
  </video>

  <!-- OVERLAY -->
  <div class="overlay"></div>

  <!-- TOP BAR -->
  <header class="topbar">

    <!-- LOGO (UPDATED) -->
    <a href="homepage.html" class="logo">
      <img src="logo.png" alt="TwinThink Logo">
      <span>TwinThink / Upload Engine</span>
    </a>

    <div class="status">● System Online</div>

  </header>

  <!-- MAIN GRID -->
  <div class="grid">

    <!-- LEFT PANEL -->
    <div class="panel left">
      <h3>File Queue</h3>
      <div id="fileList" class="file-list">No files added</div>
    </div>

    <!-- CENTER PANEL -->
    <div class="panel center">

      <h2>Drop Documents</h2>
      <p>PDF / DOCX / TXT supported</p>

      <div class="dropzone" id="dropArea">
        <p>Drag & Drop files here</p>

        <input type="file" id="fileInput" hidden multiple>

        <button onclick="document.getElementById('fileInput').click()">
          Browse Files
        </button>
      </div>

      <button class="upload-btn" onclick="uploadFiles()">
        Execute Upload
      </button>

    </div>

    <!-- RIGHT PANEL -->
    <div class="panel right">
      <h3>System Info</h3>

      <div class="info">
        <p>📦 Storage: 1.2 GB used</p>
        <p>🧠 Embedding: Ready</p>
        <p>⚡ Pipeline: Idle</p>
        <p>🔗 Vector DB: FAISS Connected</p>
      </div>
    </div>

  </div>

  <script src="upload.js"></script>
</body>
</html>
