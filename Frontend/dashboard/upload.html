<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TwinThink - Upload Engine</title>

  <link rel="stylesheet" href="upload.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

  <!-- BACKGROUND -->
  <video autoplay muted loop class="bg-video">
    <source src="background_vedio.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <!-- ================= GLOBAL NAVBAR ================= -->
  <header class="topbar">

    <a href="dashboard.html" class="logo">
      <img src="logo.png" alt="logo">
      <span>TwinThink</span>
    </a>

    <nav class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a class="active" href="upload.html">Upload</a>
      <a href="chat.html">AI Chat</a>
      <a href="memory.html">Memory</a>
      <a href="settings.html">Settings</a>
    </nav>

    <div class="status">● System Online</div>

  </header>

  <!-- MAIN GRID -->
  <div class="grid">

    <!-- LEFT: FILE QUEUE -->
    <div class="panel">
      <h3>File Queue</h3>
      <div id="fileList" class="file-list">No files added</div>
    </div>

    <!-- CENTER: UPLOAD AREA -->
    <div class="panel center">

      <h2>Upload Documents</h2>
      <p>PDF / DOCX / TXT supported</p>

      <div class="dropzone" id="dropArea">

        <p>Drag & Drop files here</p>

        <input type="file" id="fileInput" multiple hidden>

        <button onclick="document.getElementById('fileInput').click()">
          Browse Files
        </button>

      </div>

      <button class="upload-btn" onclick="uploadFiles()">
        Execute Upload
      </button>

    </div>

    <!-- RIGHT: SYSTEM INFO -->
    <div class="panel">
      <h3>System Info</h3>

      <div class="info">
        <p>📦 Storage: 1.2 GB used</p>
        <p>🧠 Embedding: Ready</p>
        <p>⚡ Pipeline: Idle</p>
        <p>🔗 Vector DB: FAISS Connected</p>
      </div>

    </div>

  </div>

  <script src="upload.js"></script>
</body>
</html>
