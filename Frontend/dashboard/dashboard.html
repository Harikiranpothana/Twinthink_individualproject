<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TwinThink Dashboard</title>

  <link rel="stylesheet" href="dashboard.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <!-- BACKGROUND -->
  <video autoplay muted loop class="bg-video">
    <source src="background_vedio.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <a href="dashboard.html" class="logo">
      <img src="logo.png" alt="logo">
      <span>TwinThink</span>
    </a>

    <nav>
      <a class="active" href="dashboard.html">🏠 Dashboard</a>
      <a href="upload.html">📄 Upload</a>
      <a href="chat.html">💬 AI Chat</a>
      <a href="memory.html">🧠 Memory</a>
      <a href="settings.html">⚙ Settings</a>
    </nav>

  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">

    <!-- ================= CARDS ================= -->
    <section class="cards">

      <div class="card">
        <h3 id="totalDocs">0</h3>
        <p>Documents Uploaded</p>
      </div>

      <div class="card">
        <h3 id="totalQueries">0</h3>
        <p>Questions Asked</p>
      </div>

      <div class="card">
        <h3 id="totalChats">0</h3>
        <p>Chats Stored</p>
      </div>

      <div class="card">
        <h3 id="totalUsers">0</h3>
        <p>Registered Users</p>
      </div>

    </section>


    <!-- ================= MIDDLE SECTION ================= -->
    <section class="middle">

      <!-- ACTIVITY FEED -->
      <div class="panel">

        <h3>Recent Activity</h3>

        <ul id="activityFeed">

          <li>Loading activities...</li>

        </ul>

      </div>


      <!-- ANALYTICS -->
      <div class="panel">

        <h3>Analytics</h3>

        <div class="chart-container">

          <canvas id="chart"></canvas>

        </div>

      </div>

    </section>


    <!-- ================= BOTTOM ================= -->
    <section class="bottom">

      <div class="panel">

        <h3>⚠ What You Might Have Forgotten</h3>

        <ul id="forgottenList">

          <li>Loading insights...</li>

        </ul>

      </div>

    </section>

  </main>

  <script src="dashboard.js"></script>

</body>
</html>
